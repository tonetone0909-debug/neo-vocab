<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>마이페이지 · NEO TOEFL Writing Task 1</title>
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="stylesheet" href="../assets/colors_and_type.css">
<link rel="stylesheet" href="assets/app.css">
<script src="../assets/config.js"></script>
<script src="../assets/auth.js"></script>
<script src="../assets/shell.js"></script>
</head>
<body>

<div class="top-strip"></div>
<div class="app-topbar">
  <a class="brand" href="../index.html"><span class="dot"></span>NEO&nbsp;TOEFL</a>
  <span class="crumb">마이페이지 · MY</span>
</div>

<main class="app">
  <div class="idx-kicker" style="padding-top:8px;">MY PAGE</div>
  <h1 class="idx-title" style="font-size:clamp(32px,8vw,44px);">내 학습 현황</h1>

  <div class="today-review" id="ach">
    <div><div class="tr-k">ACHIEVEMENT · 학습 달성량</div><div class="tr-t" id="ach-t">아직 푼 세트가 없어요</div></div>
    <div class="tr-n" id="ach-n">0%</div>
  </div>
  <div class="mp-card hidden" id="ach-panel" style="margin-top:10px;"></div>

  <div class="sec-k" style="--sec-accent:var(--neo-blaze)">개념별 정답률<span class="en">BY CONCEPT</span></div>
  <div class="mp-card" id="mp-concept"></div>

  <div class="sec-k" style="--sec-accent:var(--neo-hot)">모의고사<span class="en">MOCK</span></div>
  <div class="mp-card" id="mp-mock"><p class="idx-lead" style="font-size:14px;margin:0;">모의고사는 문항 준비 중이에요. 곧 만나요!</p></div>

  <div class="sec-k" style="--sec-accent:var(--neo-grind)">최근 기록<span class="en">RECENT</span></div>
  <div class="mp-card" id="mp-recent"></div>

  <!-- 설치·로그인은 두 앱 공통이라 네오토플 홈(허브)이 소유한다. 여기엔 Writing 전용만. -->
  <div class="sec-k" style="--sec-accent:var(--neo-acid)">도움말<span class="en">HELP</span></div>
  <a class="deck-card" href="guide.html" style="display:block;">
    <div class="dt" style="font-size:17px;">✏️ Writing Task 1 사용법 가이드</div>
    <div class="dd">개념 학습부터 문장 조립·채점·리뷰까지 화면과 함께 안내해요</div>
  </a>
</main>

<nav class="tabbar">
  <a href="index.html"><span class="ic">🏠</span>홈</a>
  <a href="concepts.html"><span class="ic">📚</span>개념</a>
  <a href="w1-mock.html"><span class="ic">📝</span>모의고사</a>
  <a href="mypage.html" class="on"><span class="ic">📊</span>마이페이지</a>
</nav>

<!-- 이 화면은 개념·세트 "개수"만 필요하다 → 2.1MB 짜리 w1.js/w1_mock.js 대신 908B 메타만 로드. -->
<script src="data/w1_meta.js"></script>
<script src="assets/w1store.js"></script>
<script>
(function(){
  const META = window.NEO_DATA_W1_META || { concepts: [], mocks: 0, totalSets: 0 };
  const shortName = cn => (META.concepts.find(c=>c.n===cn) || {}).short || ("개념 "+cn);
  const R = NEO_W1_STORE.load();
  const attempts = Object.entries(R).map(([k,v])=>({key:k, isMock:k.indexOf("mock")===0, ...v}));
  const concAtt = attempts.filter(a=>!a.isMock);
  const mockAtt = attempts.filter(a=>a.isMock);

  // 개념 메타 (build_w1_meta.js 산출 — 개념 라벨·세트 수의 단일 출처)
  const concepts = META.concepts.map(c=>[c.n, c.title]);
  function setsOf(cn){ const c = META.concepts.find(x=>x.n===cn); return c ? c.sets : 0; }
  const totalMock = META.mocks;
  const totalSets = META.totalSets;
  const doneSets = attempts.length;

  // 학습 달성량
  const achPct = totalSets ? Math.round(doneSets/totalSets*100) : 0;
  document.getElementById("ach-n").textContent = achPct+"%";
  document.getElementById("ach-t").textContent = doneSets ? `전체 ${totalSets}개 중 ${doneSets}개 완료 · 눌러서 자세히` : "아직 푼 세트가 없어요";
  if(!doneSets) document.getElementById("ach").classList.add("state-empty");

  // 달성량 클릭 → 완료 현황 패널 토글
  const panel = document.getElementById("ach-panel");
  const doneByC = {}; concAtt.forEach(a=>{ (doneByC[a.concept_n]=doneByC[a.concept_n]||new Set()).add(a.set_id); });
  const doneMockIds = new Set(mockAtt.map(a=>a.exam_id));
  let chips = concepts.map(([cn])=>{
    const done=(doneByC[cn]||new Set()).size, tot=setsOf(cn);
    const full = done>=tot && tot>0;
    return `<span class="ach-chip ${full?"full":(done?"part":"")}">${shortName(cn)} <b>${done}/${tot}</b></span>`;
  }).join("");
  if(totalMock) chips += `<span class="ach-chip ${doneMockIds.size>=totalMock?"full":(doneMockIds.size?"part":"")}">모의고사 <b>${doneMockIds.size}/${totalMock}</b></span>`;
  panel.innerHTML = `<div class="ach-grid">${chips}</div>`;
  document.getElementById("ach").addEventListener("click",()=>panel.classList.toggle("hidden"));

  // 개념별 정답률 (attempt 있는 세트만 집계 · 세트별 최고기록)
  const mpc = document.getElementById("mp-concept");
  const byC = {};
  concAtt.forEach(a=>{ const c=a.concept_n; if(!byC[c]) byC[c]={correct:0,total:0,sets:0}; byC[c].correct+=a.correct; byC[c].total+=a.total; byC[c].sets++; });
  const rows = concepts.filter(([cn])=>byC[cn]);
  if(!rows.length){ mpc.innerHTML=`<p class="idx-lead" style="font-size:14px;margin:0;">문제풀이를 한 세트라도 풀면 개념별 정답률이 나와요.</p>`; }
  else rows.forEach(([cn])=>{
    const s=byC[cn]; const pct=Math.round(s.correct/s.total*100);
    const div=document.createElement("div"); div.className="mp-row";
    const tier = pct>=80?"hi":pct>=50?"mid":"lo";
    div.innerHTML=`<span class="mp-name">${shortName(cn)}</span><div class="mp-track"><div class="mp-fill ${tier}" style="width:${pct}%"></div></div><span class="mp-pct">${pct}%</span>`;
    mpc.appendChild(div);
  });

  // 모의고사 정답률
  const mpm = document.getElementById("mp-mock");
  if(mockAtt.length){
    mpm.innerHTML="";
    mockAtt.slice().sort((a,b)=>(a.exam_id||0)-(b.exam_id||0)).forEach(a=>{
      const pct=Math.round(a.correct/a.total*100), tier=pct>=80?"hi":pct>=50?"mid":"lo";
      const div=document.createElement("div"); div.className="mp-row";
      div.innerHTML=`<span class="mp-name">모의 ${a.exam_id}</span><div class="mp-track"><div class="mp-fill ${tier}" style="width:${pct}%"></div></div><span class="mp-pct">${a.correct}/${a.total}</span>`;
      mpm.appendChild(div);
    });
  } else if(!totalMock){
    mpm.innerHTML=`<p class="idx-lead" style="font-size:14px;margin:0;">모의고사는 문항 준비 중이에요. 곧 만나요!</p>`;
  } else {
    mpm.innerHTML=`<p class="idx-lead" style="font-size:14px;margin:0;">모의고사를 한 세트라도 풀면 정답률이 나와요.</p>`;
  }

  // 최근 기록 (10개 + 다시 풀어보기)
  const rec = document.getElementById("mp-recent");
  const recent = attempts.slice().sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,10);
  if(!recent.length){ rec.innerHTML=`<p class="idx-lead" style="font-size:14px;margin:0;">기록이 없어요.</p>`; }
  else recent.forEach(a=>{
    const m=Math.floor((a.time||0)/60), s=(a.time||0)%60;
    let label, href;
    if(a.isMock){ label=`모의고사 ${a.exam_id}`; href=`writing.html?exam=${a.exam_id}`; }
    else { label=`${shortName(a.concept_n)} · 세트 ${a.set_id}`; href=`writing.html?c=${a.concept_n}&set=${a.set_id}`; }
    const div=document.createElement("div"); div.className="mp-row mp-recent-row";
    div.innerHTML=`<span class="mp-name" style="flex:1">${label}</span><span class="mp-pct" style="flex:0 0 auto">${a.correct}/${a.total} · ${m}:${String(s).padStart(2,"0")}</span><a class="btn btn-ghost btn-sm mp-redo" href="${href}">다시 풀기</a>`;
    rec.appendChild(div);
  });

  if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("../sw.js").catch(()=>{}));
})();
</script>
</body>
</html>
