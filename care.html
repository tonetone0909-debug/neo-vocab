<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOCA CARE 누적점수 · NEO VOCAB</title>
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/icons/icon-32.png">
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="assets/app.css">
<script src="assets/config.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/ui.js"></script>
<style>
  #care-wrap{--green:#2ECC71;--green-deep:#0B6E3A;--ink:#0B2E1C;--mint:#E8FFF3;--line:#D4EDDE;--muted:#5A7A68;--faint:#8A9F92}
  /* hero */
  .care-hero{background:linear-gradient(160deg,#0B2E1C,#0B6E3A);color:#fff;border-radius:20px;
    padding:26px 24px;text-align:center;box-shadow:5px 5px 0 #0A0A0A;border:2px solid #0A0A0A}
  .care-hero .lbl{font-size:11px;font-weight:800;letter-spacing:.14em;color:rgba(255,255,255,.6);text-transform:uppercase}
  .care-hero .score{font-size:66px;font-weight:900;line-height:1;letter-spacing:-.03em;margin:10px 0 2px;font-variant-numeric:tabular-nums}
  .care-hero .score small{font-size:24px;font-weight:800;color:rgba(255,255,255,.7);letter-spacing:0}
  .care-hero .mbadge{display:inline-block;margin-top:12px;border:2px solid #fff;border-radius:999px;
    padding:4px 14px;font-weight:800;font-size:13px;letter-spacing:.02em}
  .care-hero .mbadge.prem{background:#E8FF3A;color:#0A0A0A;border-color:#E8FF3A}
  /* reward card */
  .rw-card{background:linear-gradient(170deg,#E8FFF3,#FAFFFE);border:1.5px solid var(--line);border-radius:14px;padding:16px 18px;animation:rwfade .5s ease both}
  .rw-icon{font-size:32px;flex-shrink:0;display:inline-block;animation:rwpulse 2.4s ease-in-out infinite}
  .rw-num{font-size:28px;font-weight:900;color:var(--green);line-height:1;font-variant-numeric:tabular-nums}
  .rw-fill{width:3%;height:100%;background:linear-gradient(90deg,var(--green),var(--green-deep));border-radius:99px;transition:width 1.1s cubic-bezier(.22,1,.36,1)}
  .rw-done{background:#0B2E1C;color:#fff;border-radius:14px;padding:20px;text-align:center;animation:rwfade .5s ease both}
  @keyframes rwpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @keyframes rwfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  /* ladder */
  .lad{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px}
  .lad.reached{background:var(--mint);border-color:var(--green)}
  .lad.next{border-color:#0A0A0A;box-shadow:2px 2px 0 #0A0A0A}
  .lad .lic{font-size:20px;flex-shrink:0;width:26px;text-align:center}
  .lad .lnm{flex:1;min-width:0;font-weight:700;font-size:14px;color:var(--ink)}
  .lad .lnm em{font-style:normal;color:var(--muted);font-weight:600;font-size:12px}
  .lad .lpt{font-weight:800;font-size:14px;color:var(--faint);font-variant-numeric:tabular-nums}
  .lad.reached .lpt{color:var(--green-deep)}
  .lad .lchk{font-size:12px;font-weight:800;color:var(--green-deep)}
  @media(prefers-reduced-motion:reduce){.rw-icon,.rw-card,.rw-done{animation:none}.rw-fill{transition:none}}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="progress.html"><span class="dot"></span>NEO VOCAB</a>
  <span class="crumb">VOCA CARE</span>
</div>

<main class="app" id="care-wrap">
  <div class="kicker">VOCA CARE · 누적점수 리워드</div>
  <h1 class="title-kr" style="font-size:clamp(28px,7vw,40px);">누적 점수</h1>

  <div id="care-body" style="margin-top:16px;">
    <div class="rw-card" style="text-align:center;color:#5A7A68;">불러오는 중…</div>
  </div>

  <a href="progress.html" class="btn btn-sm btn-ghost btn-block" style="margin-top:22px;">← 마이페이지로</a>
</main>

<nav class="tabbar">
  <a href="index.html"><span class="ic">🏠</span>홈</a>
  <a href="study.html?deck=practical"><span class="ic">📝</span>어휘</a>
  <a href="quiz.html"><span class="ic">✅</span>퀴즈</a>
  <a href="progress.html" class="on"><span class="ic">📊</span>마이페이지</a>
</nav>

<script>
(function () {
  const $ = id => document.getElementById(id);
  const esc = s => String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

  // VOCA CARE 리워드 사다리 (누적 점수 → 상품)
  const REWARDS = [
    { pt: 200, name: "커피 쿠폰", icon: "☕" },
    { pt: 300, name: "커피 쿠폰", icon: "☕" },
    { pt: 400, name: "스타벅스 기프티콘", icon: "🎁", val: "1만원" },
    { pt: 500, name: "커피 쿠폰", icon: "☕" },
    { pt: 600, name: "커피 쿠폰", icon: "☕" },
    { pt: 700, name: "치킨 기프티콘", icon: "🍗", val: "3만원" },
    { pt: 800, name: "커피 쿠폰", icon: "☕" },
    { pt: 900, name: "커피 쿠폰", icon: "☕" },
    { pt: 1000, name: "배달의민족 기프티콘", icon: "🎉", val: "5만원" },
    { pt: 1200, name: "TOEFL 응시료 지원", icon: "🎫", val: "5만원" },
    { pt: 1400, name: "TOEFL 응시료 지원", icon: "🎫", val: "10만원" },
    { pt: 1550, name: "TOEFL 응시료 지원", icon: "🏆", val: "20만원" }
  ];

  function countUp(el, to, dur) {
    if (matchMedia("(prefers-reduced-motion:reduce)").matches) { el.textContent = to; return; }
    const t0 = performance.now();
    (function tick(t) {
      const k = Math.min(1, (t - t0) / dur), e = 1 - Math.pow(1 - k, 3);
      el.textContent = Math.round(to * e);
      if (k < 1) requestAnimationFrame(tick); else el.textContent = to;
    })(t0);
  }

  function render(p) {
    const body = $("care-body");
    const score = (p.score === null || p.score === undefined || p.score === "" || isNaN(Number(p.score))) ? 0 : Number(p.score);
    const prem = /PREMIUM/i.test(p.membership || "");
    // next reward
    let prev = 0, next = null;
    for (const r of REWARDS) { if (r.pt > score) { next = r; break; } prev = r.pt; }

    // --- hero ---
    let html = '<div class="care-hero">'
      + '<div class="lbl">누적 점수 · 이번 달</div>'
      + '<div class="score"><span id="hero-score">0</span><small> 점</small></div>'
      + '<div class="mbadge' + (prem ? ' prem' : '') + '">' + (prem ? '★ ' : '') + esc(p.membership || "") + '</div>'
      + '</div>';

    // --- next reward card ---
    if (!next) {
      html += '<div class="rw-done" style="margin-top:16px;">'
        + '<div class="rw-icon" style="font-size:34px;">🏆</div>'
        + '<div style="font-weight:800;font-size:17px;margin-top:6px;">모든 리워드 달성!</div>'
        + '<div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;">최고 등급이에요</div></div>';
    } else {
      const remaining = next.pt - score, span = next.pt - prev;
      const pct = Math.max(3, Math.min(100, Math.round((score - prev) / span * 100)));
      const valTxt = next.val ? ' <span style="color:#5A7A68;font-weight:600;">(' + esc(next.val) + ')</span>' : '';
      html += '<div class="rw-card" style="margin-top:16px;">'
        + '<div style="display:flex;align-items:center;gap:13px;">'
        +   '<div class="rw-icon">' + next.icon + '</div>'
        +   '<div style="flex:1;min-width:0;">'
        +     '<div style="font-size:12px;font-weight:700;letter-spacing:.02em;color:#5A7A68;">다음 상품까지</div>'
        +     '<div style="font-size:16px;font-weight:800;color:#0B2E1C;line-height:1.3;">' + esc(next.name) + valTxt + '</div>'
        +   '</div>'
        +   '<div style="text-align:right;flex-shrink:0;">'
        +     '<div class="rw-num"><span id="rw-num">0</span></div>'
        +     '<div style="font-size:11px;color:#5A7A68;font-weight:700;margin-top:2px;">점 남았어요</div>'
        +   '</div>'
        + '</div>'
        + '<div style="margin-top:13px;height:10px;background:#D4EDDE;border-radius:99px;overflow:hidden;">'
        +   '<div class="rw-fill"></div>'
        + '</div>'
        + '<div style="display:flex;justify-content:space-between;margin-top:7px;font-size:12px;color:#8A9F92;font-weight:700;">'
        +   '<span>누적 ' + score + '점</span><span>목표 ' + next.pt + '점</span>'
        + '</div></div>';
    }

    // --- full ladder ---
    const nextPt = next ? next.pt : Infinity;
    html += '<div class="section-kr" style="margin-top:28px;">리워드 사다리</div><div style="margin-top:12px;">';
    for (const r of REWARDS) {
      const reached = score >= r.pt, isNext = r.pt === nextPt;
      html += '<div class="lad' + (reached ? ' reached' : (isNext ? ' next' : '')) + '">'
        + '<span class="lic">' + r.icon + '</span>'
        + '<span class="lnm">' + esc(r.name) + (r.val ? ' <em>(' + esc(r.val) + ')</em>' : '') + '</span>'
        + (reached ? '<span class="lchk">받기 가능 ✓</span>' : (isNext ? '<span class="lchk" style="color:#0A0A0A;">다음 목표</span>' : ''))
        + '<span class="lpt">' + r.pt + '</span>'
        + '</div>';
    }
    html += '</div>';
    html += '<p style="font-size:12px;color:#8A9F92;line-height:1.6;margin-top:14px;">※ 매일반 2달 / 주3일반 4달 기준 누적 점수 · 성적은 시험 결과에 따라 갱신돼요</p>';

    body.innerHTML = html;
    // animate hero score + reward
    countUp($("hero-score"), score, 1000);
    if (next) {
      const fill = body.querySelector(".rw-fill");
      const remaining = next.pt - score, span = next.pt - prev;
      const pct = Math.max(3, Math.min(100, Math.round((score - prev) / span * 100)));
      requestAnimationFrame(() => requestAnimationFrame(() => { fill.style.width = pct + "%"; }));
      countUp($("rw-num"), remaining, 900);
    }
  }

  function renderEmpty(msg) {
    $("care-body").innerHTML = '<div class="rw-card" style="text-align:center;padding:30px 20px;color:#5A7A68;">'
      + '<div style="font-size:30px;">📊</div>'
      + '<div style="font-weight:800;font-size:16px;color:#0B2E1C;margin-top:8px;">' + esc(msg) + '</div>'
      + '<div style="font-size:13px;margin-top:4px;">성적표에 이름이 등록되면 표시돼요</div></div>';
  }

  const code = sessionStorage.getItem("neo_code") || localStorage.getItem("neo_code") || "";
  const authUrl = ((window.NEO_AUTH || {}).url || "").trim();

  // 세션에 저장된 프로필이 있으면 즉시 표시(빠름) 후, 항상 최신으로 새로고침
  let shown = false;
  try {
    const cached = JSON.parse(sessionStorage.getItem("neo_profile") || "null");
    if (cached && cached.ok && cached.membership) { render(cached); shown = true; }
  } catch (e) {}

  if (!authUrl || !code) { if (!shown) renderEmpty("로그인이 필요해요"); return; }
  fetch(authUrl + "?action=profile&code=" + encodeURIComponent(code))
    .then(r => r.json())
    .then(p => {
      if (!p || !p.ok) { if (!shown) renderEmpty("불러오지 못했어요"); return; }
      if (!p.membership) { renderEmpty("아직 성적 기록이 없어요"); return; }
      try { sessionStorage.setItem("neo_profile", JSON.stringify(p)); } catch (e) {}
      render(p);
    })
    .catch(() => { if (!shown) renderEmpty("네트워크 오류"); });
})();
</script>
</body>
</html>
