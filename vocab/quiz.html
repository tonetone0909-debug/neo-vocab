<script>
(function () {
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const mode = params.get("mode");            // practical | academic | list
  const day = params.get("day") ? parseInt(params.get("day"),10) : null;
  const list = params.get("list");            // learning | known (mode=list)
  const size = params.get("size");            // 20 | 50 | 100 | all (mode=list)
  const fmt = params.get("fmt");
  const isList = mode === "list";
  const deckKr = mode === "academic" ? "학술어휘" : mode === "practical" ? "실용어휘"
    : list === "known" ? "학습완료 어휘" : list === "viewed" ? "확인한 어휘" : "학습중 어휘";

  function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  const FORMATS = [
    { key:"meaning",     num:"1", title:"영어 → 한국어 뜻", sub:"4지선다", type:"mc" },
    { key:"reverse",     num:"2", title:"한국어 뜻 → 영어", sub:"4지선다", type:"mc" },
    { key:"reverseType", num:"3", title:"한국어 뜻 → 영어", sub:"타이핑",   type:"type" },
    { key:"synonym",     num:"4", title:"영어 → 동의어",    sub:"4지선다", type:"mc" },
    { key:"synonymType", num:"5", title:"영어 → 동의어",    sub:"타이핑 · 동의어 1개", type:"type" },
    { key:"listenUS",    num:"6", title:"듣고 영문 타이핑 · US", sub:"🇺🇸 미국 발음", type:"listen", lang:"en-US" },
    { key:"listenUK",    num:"7", title:"듣고 영문 타이핑 · UK", sub:"🇬🇧 영국 발음", type:"listen", lang:"en-GB" },
  ];
  const fmtDef = FORMATS.find(f => f.key === fmt);

  // 양식 선택 그룹 — 카테고리 누르면 4지선다/타이핑 하위 버튼이 펼쳐짐
  const GROUPS = [
    { n:"1", title:"영어 → 한국어 뜻", modes:[ { key:"meaning", label:"4지선다" } ] },
    { n:"2", title:"한국어 뜻 → 영어", modes:[ { key:"reverse", label:"4지선다" }, { key:"reverseType", label:"타이핑" } ] },
    { n:"3", title:"영어 → 동의어",    modes:[ { key:"synonym", label:"4지선다" }, { key:"synonymType", label:"타이핑 (동의어 1개)" } ] },
    { n:"4", title:"듣고 영문 타이핑", modes:[ { key:"listenUS", label:"🇺🇸 US 발음" }, { key:"listenUK", label:"🇬🇧 UK 발음" } ] },
  ];

  if (!mode) return; // hub static

  // word set for this quiz
  function wordSet() {
    if (isList) {
      const keys = NEO_STORE.allByStatus(list);
      let ws = keys.map(k => {
        if (k.deck === "ctest") { const w = NEO_DECK.blanksByLemma(k.lemma); return w ? { term:w.answer, lemma:w.lemma, meaning:w.meaning, pos:w.pos, synonyms:w.synonyms, tts:w.tts, skill:"reading", deck:"ctest" } : null; }
        const e = NEO_DECK.byLemma(k.lemma); return e ? { term:e.term, lemma:e.lemma, meaning:e.meaning, pos:e.pos, synonyms:e.synonyms, tts:e.tts, skill:e.skill, deck:e.deck } : null;
      }).filter(Boolean);
      ws = shuffle(ws);
      if (size && size !== "all") ws = ws.slice(0, parseInt(size,10));
      return ws;
    }
    return NEO_DECK.dayWords(mode, day);
  }
  const pool = (isList ? NEO_DECK.vocab() : NEO_DECK.vocab(null, mode)); // distractor pool

  // ---------- DAY GRID (deck modes only) ----------
  function showDayGrid() {
    $("hub").classList.add("hidden"); $("daylist").classList.remove("hidden");
    $("crumb").textContent = `${deckKr} Quiz`; $("day-deck").textContent = deckKr;
    $("day-grid").innerHTML = NEO_DECK.days(mode).map(d => `<a class="day-card" href="quiz.html?mode=${mode}&day=${d.day}">
      <div class="dnum">DAY ${d.day}</div><div class="dcount">${d.count}단어</div></a>`).join("");
  }

  // ---------- FORMAT CHOOSER ----------
  function baseQuery() {
    return isList ? `mode=list&list=${list}&size=${size||"all"}` : `mode=${mode}&day=${day}`;
  }

  // ---------- 퀴즈 세션 저장 (SRS 진도와 분리된 로컬 전용 key. 서버 동기화 안 함) ----------
  // Review 버튼이 "채점된 세션"을 그대로 되살리는 데 쓴다. vocab 은 오답 보기·정답 유의어가 매번
  // 랜덤이라 재생성이 불가능 → 세션을 통째로 저장해야만 리뷰를 복원할 수 있다.
  const QKEY_BASE = "neo_vocab_quiz_v1";
  function quizCode(){ try { return sessionStorage.getItem("neo_code") || localStorage.getItem("neo_code") || ""; } catch(e){ return ""; } }
  function quizKey(){ const c = quizCode(); return c ? QKEY_BASE+":"+c : QKEY_BASE; }
  function quizLoad(){ try { return JSON.parse(localStorage.getItem(quizKey())) || {}; } catch(e){ return {}; } }
  function quizSlot(fmtKey){ return `${baseQuery()}|${fmtKey}`; }   // Day(또는 list)+양식 단위. 세션당 1개(덮어씀).
  function quizGet(fmtKey){ return quizLoad()[quizSlot(fmtKey)]; }
  function quizSaveSession(){
    try {
      const db = quizLoad();
      db[quizSlot(fmt)] = {
        score: session.filter(it=>it.ok).length, total: session.length, ts: Date.now(),
        // 리뷰 렌더가 읽는 필드만 slim 저장(promptHtml/options 제외).
        session: session.map(it => ({ w:{ term:it.w.term, lemma:it.w.lemma, meaning:it.w.meaning, deck:it.w.deck },
          your:it.your, ok:it.ok, correct:it.correct, answers:it.answers||null }))
      };
      localStorage.setItem(quizKey(), JSON.stringify(db));
    } catch(e){}
  }
  function restoreReview(){
    const saved = quizGet(fmt);
    if(!saved || !Array.isArray(saved.session) || !saved.session.length) return false;
    session = saved.session.slice(); graded = true;
    showReview();
    return true;
  }
  // 양식별 액션 버튼 — 푼 적 있으면 [Review][다시풀기], 없으면 [풀기].
  function fmtActs(fmtKey){
    const done = quizGet(fmtKey);
    return `<span class="fmt-acts" data-fmt="${fmtKey}">`
      + (done ? `<button class="btn btn-sm btn-ghost" data-act="review">Review</button>`
                + `<button class="btn btn-sm btn-primary" data-act="again">다시풀기</button>`
              : `<button class="btn btn-sm btn-primary" data-act="play">풀기</button>`)
      + `</span>`;
  }
  function showFmt() {
    $("hub").classList.add("hidden"); $("fmtview").classList.remove("hidden");
    const label = isList ? deckKr : `${deckKr} · DAY ${day}`;
    $("crumb").textContent = label; $("fmt-chip").textContent = label;
    $("fmt-back").href = isList ? "progress.html" : `quiz.html?mode=${mode}`;
    $("fmt-grid").innerHTML = GROUPS.map(g => {
      if (g.modes.length === 1) {
        const m = g.modes[0];
        return `<div class="fmt-btn fmt-row"><span class="fnum">${g.n}</span><span class="fmt-label"><div>${g.title}</div><div class="fsub">${m.label}</div></span>${fmtActs(m.key)}</div>`;
      }
      return `<div class="fmt-group">
        <button class="fmt-btn fmt-head" type="button"><span class="fnum">${g.n}</span><span><div>${g.title}</div><div class="fsub">유형 선택</div></span><span class="arw">▸</span></button>
        <div class="fmt-sub" style="display:none;">
          ${g.modes.map(m => `<div class="fmt-btn fmt-mode fmt-row"><span class="fmt-label">${m.label}</span>${fmtActs(m.key)}</div>`).join("")}
        </div>
      </div>`;
    }).join("");
    // 접이식 그룹 토글
    $("fmt-grid").querySelectorAll(".fmt-head").forEach(h => h.addEventListener("click", () => {
      const sub = h.nextElementSibling, open = sub.style.display !== "none";
      sub.style.display = open ? "none" : "flex";
      h.classList.toggle("open", !open);
    }));
    // 양식별 버튼 핸들러
    $("fmt-grid").querySelectorAll(".fmt-acts").forEach(box => {
      const k = box.dataset.fmt, playUrl = `quiz.html?${baseQuery()}&fmt=${k}`;
      const b = a => box.querySelector(`[data-act="${a}"]`);
      if (b("play"))   b("play").addEventListener("click", () => location.href = playUrl);
      if (b("review")) b("review").addEventListener("click", () => location.href = playUrl + "&view=review");
      if (b("again"))  b("again").addEventListener("click", () => neoConfirm("이 양식을 다시 풀어볼까요?", { okText:"다시 풀기" }).then(ok => { if(ok) location.href = playUrl; }));
    });
  }

  // ---------- SESSION (deferred grading) ----------
  let session = [], idx = 0, graded = false;

  function sampleVals(arr, n, excludeLC) {
    const seen = new Set(excludeLC); const out = [];
    for (const v of shuffle(arr)) { const key = v.toLowerCase(); if (seen.has(key)) continue; seen.add(key); out.push(v); if (out.length>=n) break; }
    return out;
  }
  // 오답 보기 3개 — 같은 품사 단어에서 우선(다른 Day 포함). 부족하면 아무 품사로 보충.
  function distractorsByPos(w, valueFn) {
    const excl = new Set([String(valueFn(w)||"").toLowerCase()]);
    const samePos = pool.filter(x => x.lemma !== w.lemma && x.pos && w.pos && x.pos === w.pos);
    let out = sampleVals(samePos.map(valueFn).filter(Boolean), 3, excl);
    if (out.length < 3) {
      out.forEach(d => excl.add(String(d).toLowerCase()));
      const any = pool.filter(x => x.lemma !== w.lemma);
      out = out.concat(sampleVals(any.map(valueFn).filter(Boolean), 3 - out.length, excl));
    }
    return out;
  }

  function buildSession() {
    let words = wordSet();
    if (fmt === "synonym" || fmt === "synonymType") words = words.filter(w => (w.synonyms||[]).length);
    // 문항 순서 고정(wordSet 순서 유지) — 사용자 요청. 보기(options) 셔플은 아래에서 유지.
    session = words.map(w => {
      const it = { w, your: null };
      if (fmt === "meaning") {
        it.instr = "이 단어의 뜻은?"; it.promptHtml = `<div class="quiz-prompt">${esc(w.term)}</div>`;
        it.correct = w.meaning;
        it.options = shuffle([w.meaning, ...distractorsByPos(w, x => x.meaning)]);   // 보기 = 같은 품사 뜻
      } else if (fmt === "reverse") {
        it.instr = "이 뜻에 맞는 영어 단어는?"; it.promptHtml = `<div class="quiz-prompt kr">${esc(w.meaning)}</div>`;
        it.correct = w.term;
        it.options = shuffle([w.term, ...distractorsByPos(w, x => x.term)]);          // 보기 = 같은 품사 단어
      } else if (fmt === "synonym") {
        it.instr = "이 단어의 동의어는?"; it.promptHtml = `<div class="quiz-prompt">${esc(w.term)}</div>`;
        const syns = w.synonyms || []; it.correct = shuffle(syns)[0];
        const exclude = new Set([...syns.map(s=>s.toLowerCase()), w.lemma]);
        it.options = shuffle([it.correct, ...sampleVals(pool.filter(x=>x.lemma!==w.lemma).flatMap(x=>x.synonyms||[]).filter(s=>!exclude.has(s.toLowerCase())), 3, new Set([it.correct.toLowerCase()]))]);
      } else if (fmt === "reverseType") {
        it.type = "type"; it.instr = "이 뜻에 맞는 영어 단어를 입력하세요";
        it.promptHtml = `<div class="quiz-prompt kr">${esc(w.meaning)}</div>`;
        it.correct = w.term;
      } else if (fmt === "synonymType") {
        it.type = "type"; it.instr = "이 단어의 동의어를 하나 입력하세요";
        it.promptHtml = `<div class="quiz-prompt">${esc(w.term)}</div>`;
        it.answers = (w.synonyms || []);            // 복수 정답 — 하나만 맞으면 정답
        it.correct = (w.synonyms || [])[0] || "";   // 리뷰 대표 표시용
      } else { // listen
        it.type = "listen"; it.instr = "들은 단어를 영어로 입력하세요"; it.correct = (w.tts?w.tts.text:w.term);
      }
      return it;
    });
  }

  function startSession() {
    $("hub").classList.add("hidden"); $("quizview").classList.remove("hidden");
    const label = isList ? deckKr : `${deckKr} · DAY ${day}`;
    $("crumb").textContent = label; $("q-chip").textContent = fmtDef.title;
    $("quiz-back").href = `quiz.html?${baseQuery()}`;
    buildSession(); idx = 0; graded = false;
    render();
  }

  function render() {
    if (idx >= session.length) return grade();
    const it = session[idx];
    $("pos").textContent = `${idx+1} / ${session.length}`;
    $("fill").style.width = (idx/session.length*100) + "%";
    $("q-instr").textContent = it.instr;
    $("choices").innerHTML = ""; $("choices").classList.remove("hidden"); $("type-wrap").classList.add("hidden");
    if (it.type === "listen") {
      $("q-prompt-wrap").innerHTML = `<button class="listen-play" id="play">${fmtDef.sub.split(" ")[0]} 다시 듣기 🔊</button>`;
      $("choices").classList.add("hidden"); $("type-wrap").classList.remove("hidden");
      const inp = $("q-input"); inp.value = it.your || ""; inp.disabled = false; inp.placeholder = "들은 단어를 입력";
      const playFn = () => NEO_TTS && NEO_TTS.speak(it.correct, fmtDef.lang);
      $("play").addEventListener("click", playFn); setTimeout(playFn, 250); inp.focus();
    } else if (it.type === "type") {
      $("q-prompt-wrap").innerHTML = it.promptHtml;
      $("choices").classList.add("hidden"); $("type-wrap").classList.remove("hidden");
      const inp = $("q-input"); inp.value = it.your || ""; inp.disabled = false; inp.placeholder = "영어로 입력";
      inp.focus();
    } else {
      $("q-prompt-wrap").innerHTML = it.promptHtml;
      $("choices").innerHTML = it.options.map((o,i)=>`<button class="choice" data-v="${esc(o)}"><span class="ltr">${"ABCD"[i]}</span><span>${esc(o)}</span></button>`).join("");
      $("choices").querySelectorAll(".choice").forEach(b => b.addEventListener("click", () => {
        it.your = b.dataset.v;
        $("choices").querySelectorAll(".choice").forEach(x=>x.classList.remove("sel"));
        b.classList.add("sel");
        setTimeout(() => { idx++; render(); }, 200);   // no correctness feedback
      }));
    }
  }
  function nextTyping() { const it = session[idx]; it.your = $("q-input").value.trim(); idx++; render(); }

  function grade() {
    if (!graded) {
      graded = true;
      for (const it of session) {
        const your = (it.your||"").trim().toLowerCase();
        const ok = it.answers
          ? (your !== "" && it.answers.some(a => String(a).trim().toLowerCase() === your))
          : (your === (it.correct||"").trim().toLowerCase());
        it.ok = ok;
        NEO_STORE.record(it.w.skill, it.w.deck, it.w.lemma, ok);
        if (!ok) NEO_STORE.setStatus(it.w.skill, it.w.deck, it.w.lemma, "learning"); // 오답 → 학습중
      }
      quizSaveSession();   // 채점된 세션 저장 → 나중에 Review 버튼이 되살린다(SRS 와 별도 key)
    }
    showReview();
  }

  function showReview() {
    $("quizview").classList.add("hidden"); $("hub").classList.add("hidden"); $("reviewview").classList.remove("hidden");
    const ansered = session.filter(it => it.your != null).length;
    const correct = session.filter(it => it.ok).length;
    $("crumb").textContent = `${deckKr} · 리뷰`;
    $("rev-chip").textContent = fmtDef.title;
    $("rev-score").textContent = `${correct} / ${session.length}`;
    $("rev-msg").textContent = `푼 ${ansered}문제 · 정답 ${correct} · 오답 ${session.length - correct}`;
    $("rev-again").onclick = () => neoConfirm("이 양식을 다시 풀어볼까요?", { okText:"다시 풀기" }).then(ok => { if(ok) location.href = `quiz.html?${baseQuery()}&fmt=${fmt}`; });
    $("rev-home").href = "quiz.html";
    $("review-list").innerHTML = session.map(it => {
      const promptText = (fmt === "reverse" || fmt === "reverseType") ? it.w.meaning : it.w.term;
      const corr = it.answers ? it.answers.join(" / ") : it.correct;
      const cardHref = it.w.deck === "ctest" ? "blanks.html" : `study.html?term=${encodeURIComponent(it.w.lemma)}`;
      const mine = it.your ? esc(it.your) : "<i>미응답</i>";
      return `<div class="review-row ${it.ok?"ok":"no"}">
        <div class="rq"><span class="rev-mark ${it.ok?"ok":"no"}">${it.ok?"✓":"✗"}</span>${esc(promptText)}</div>
        <div class="ra"><span class="mine">내 답: ${mine}</span>${it.ok?"":` · <span class="cor">정답: ${esc(corr)}</span>`}</div>
        ${it.ok?"":`<a class="rcard" href="${cardHref}">카드 보기 →</a>`}
      </div>`;
    }).join("");
    window.scrollTo(0,0);
  }

  // events
  $("btn-review").addEventListener("click", grade);   // grade now (unanswered → wrong)
  $("q-next").addEventListener("click", nextTyping);
  $("q-input").addEventListener("keydown", e => { if (e.key==="Enter") nextTyping(); });

  // route
  if (fmt && fmtDef && (day || isList)) {
    // ?view=review → 저장 세션으로 리뷰 복원. 없으면 그냥 새 세션 시작(폴백).
    if (params.get("view") === "review" && restoreReview()) { /* 복원 완료 */ }
    else startSession();
  }
  else if (day || isList) showFmt();
  else showDayGrid();
})();
</script>
</body>
</html>
