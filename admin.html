<style>
  /* 코드 다중선택 체크박스 — 3px ink 보더 + acid 체크(하드, blur 없음) */
  .neo-chk { -webkit-appearance:none; appearance:none; flex:0 0 auto; width:22px; height:22px;
    border:3px solid var(--neo-ink); background:var(--neo-card); border-radius:0; cursor:pointer; position:relative; margin:0; }
  .neo-chk:checked { background:var(--neo-acid); }
  .neo-chk:checked::after { content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:900; line-height:1; color:var(--neo-ink); }
  .neo-chk:indeterminate { background:var(--neo-ink); }
  .neo-chk:indeterminate::after { content:"–"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-weight:900; color:var(--neo-paper); }
  .copycode .copyhint { font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; font-weight:500;
    color:var(--neo-ink); opacity:.45; margin-left:6px; }
  .copycode:hover .copyhint { opacity:.8; }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand"><span class="dot"></span>NEO&nbsp;TOEFL</span>
  <span class="crumb">ADMIN</span>
</div>

<main class="app">
  <div class="kicker" id="akick">ADMIN · CODE MANAGER</div>
  <h1 class="title-kr" id="atitle" style="font-size:clamp(28px,7vw,42px);">코드 관리</h1>

  <div id="gate" class="card" style="margin-top:16px;">
    <div class="sc-l" style="margin-bottom:8px;">관리자 코드</div>
    <input class="quiz-input" id="admincode" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="관리자 코드 입력" style="text-align:center;">
    <div class="verdict" id="gmsg" style="min-height:18px;margin-top:8px;"></div>
    <button class="btn btn-grind btn-block" id="gin" style="margin-top:6px;">확인</button>
  </div>

  <div id="panel" style="display:none;">
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-sm btn-grind" id="tab-code" style="flex:1;">코드 관리</button>
      <button class="btn btn-sm btn-ghost" id="tab-prog" style="flex:1;">학생 진도</button>
    </div>

    <div id="code-panel">
    <div class="card" style="margin-top:14px;">
      <div class="sc-l" style="margin-bottom:8px;">코드 발급</div>
      <input class="quiz-input" id="newcode" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="새 코드 (예: neo-3f9k2)" style="margin-bottom:8px;">
      <input class="quiz-input" id="newlabel" type="text" autocomplete="off" placeholder="라벨 (학생 이름 등, 선택)" style="margin-bottom:8px;">
      <button class="btn btn-known btn-block" id="addbtn">＋ 코드 추가</button>
      <div class="verdict" id="amsg" style="min-height:18px;margin-top:8px;"></div>
    </div>

    <div class="card" style="margin-top:14px;">
      <div class="sc-l" style="margin-bottom:8px;">엑셀 명단으로 일괄 생성</div>
      <p class="lead" style="font-size:13px;margin:0 0 10px;line-height:1.5;">수강생 명단(.xlsx)을 올리면 코드가 자동 생성돼요. 코드 = <b>한글 이름 + 전화번호 뒤 4자리</b> (예: 박태환4355). 명단에 <b>이름</b>·<b>연락처</b> 열이 있어야 해요.</p>
      <input type="file" id="xlsxfile" accept=".xlsx" style="margin-bottom:8px;width:100%;">
      <div class="verdict" id="xmsg" style="min-height:18px;"></div>
      <div id="preview"></div>
      <div class="verdict no" id="dupwarn" style="min-height:0;margin-top:6px;"></div>
      <button class="btn btn-known btn-block" id="bulkadd" style="margin-top:10px;display:none;">위 코드 모두 추가 →</button>
    </div>

    <div class="detail-head" style="margin-top:18px;">
      <span class="sc-l">발급된 코드 <span id="count">0</span>개</span>
      <button class="btn btn-sm btn-ghost" id="refresh">새로고침 ↻</button>
    </div>

    <input class="quiz-input" id="search" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="🔍 코드·이름 검색" style="margin:0 0 10px;">

    <div class="detail-head" id="bulkbar" style="margin:0 0 8px;gap:10px;display:none;">
      <label class="sc-l" style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;">
        <input type="checkbox" id="selall" class="neo-chk"> 전체 선택 <span id="selcount" style="opacity:.7;font-weight:700;"></span>
      </label>
      <span style="display:flex;gap:8px;flex:0 0 auto;">
        <button class="btn btn-sm btn-ghost" id="csvexport">CSV ↓</button>
        <button class="btn btn-sm btn-hard" id="bulkdel" disabled>선택 삭제</button>
      </span>
    </div>
    <div class="verdict ok" id="bmsg" style="min-height:0;margin:0 0 8px;"></div>

    <div id="list"></div>
    </div><!-- /code-panel -->

    <div id="prog-panel" style="display:none;">
      <div id="plist-view">
        <div class="detail-head" style="margin-top:16px;">
          <span class="sc-l">학생 <span id="pcount">0</span>명</span>
          <button class="btn btn-sm btn-ghost" id="prefresh">새로고침 ↻</button>
        </div>
        <input class="quiz-input" id="psearch" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="🔍 이름·코드 검색" style="margin:0 0 10px;">
        <div class="detail-head" style="margin:0 0 10px;gap:8px;">
          <span class="sc-l" style="flex:0 0 auto;">정렬</span>
          <span style="display:flex;gap:6px;">
            <button class="btn btn-sm btn-grind psort" data-sort="rate">어휘 학습률</button>
            <button class="btn btn-sm btn-ghost psort" data-sort="w1">W1 학습률</button>
            <button class="btn btn-sm btn-ghost psort" data-sort="both">합산</button>
            <button class="btn btn-sm btn-ghost psort" data-sort="recent">최근접속</button>
            <button class="btn btn-sm btn-ghost psort" data-sort="name">이름</button>
          </span>
        </div>
        <div class="verdict" id="pmsg" style="min-height:18px;"></div>
        <div id="plist"></div>
      </div>

      <div id="pdetail-view" style="display:none;">
        <button class="btn btn-sm btn-ghost" id="pback" style="margin-top:14px;">← 학생 목록</button>
        <div id="pdetail" style="margin-top:12px;"></div>
      </div>
    </div>

    <button class="btn btn-sm btn-ghost btn-block" id="logout" style="margin-top:20px;">관리자 로그아웃</button>

<!-- Writing 진도 분모(개념·세트 수)만 필요 → 소형 메타(908B). w1.js/w1_mock.js 는 로드하지 않음. -->
<script src="writing/data/w1_meta.js"></script>
<script src="assets/config.js"></script>
<script>
(function () {
  const $ = id => document.getElementById(id);
  const url = ((window.NEO_AUTH||{}).url || "").trim();
  if (!url) { document.querySelector(".app").innerHTML = '<p class="lead" style="margin-top:30px;">인증 백엔드(URL)가 아직 설정되지 않았어요. <code>assets/config.js</code>에 URL을 넣으면 관리자 기능이 활성화돼요. (AUTH_SETUP.md 참고)</p>'; return; }

  let admin = sessionStorage.getItem("neo_admin") || "";

  function api(params) {
    return fetch(url + "?" + params).then(r => r.json());
  }
  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

  function showPanel() { $("gate").style.display = "none"; $("panel").style.display = "block"; load(); }

  function gateIn() {
    const c = $("admincode").value.trim();
    if (!c) return;
    $("gmsg").textContent = "확인 중…"; $("gmsg").className = "verdict";
    api("action=validate&code=" + encodeURIComponent(c)).then(d => {
      if (d && d.ok && d.role === "admin") {
        admin = c; sessionStorage.setItem("neo_admin", c); $("gmsg").textContent = ""; showPanel();
      } else { $("gmsg").textContent = "관리자 코드가 아니에요."; $("gmsg").className = "verdict no"; }
    }).catch(() => { $("gmsg").textContent = "인터넷 연결이 필요해요."; $("gmsg").className = "verdict no"; });
  }

  let allCodes = [];

  function load() {
    $("list").innerHTML = '<p class="lead">불러오는 중…</p>';
    return api("action=list&admin=" + encodeURIComponent(admin)).then(d => {
      if (!d || !d.ok) {
        if (d && d.error === "forbidden") { sessionStorage.removeItem("neo_admin"); $("panel").style.display="none"; $("gate").style.display="block"; return; }
        $("list").innerHTML = '<p class="lead no">목록을 불러오지 못했어요.</p>'; return;
      }
      allCodes = d.codes || [];
      $("count").textContent = allCodes.length;
      render();
    }).catch(() => { $("list").innerHTML = '<p class="lead no">인터넷 연결이 필요해요.</p>'; });
  }

  function filtered() {
    const q = ($("search").value || "").trim().toLowerCase();
    if (!q) return allCodes;
    return allCodes.filter(c => (c.code||"").toLowerCase().includes(q) || (c.label||"").toLowerCase().includes(q));
  }
  function rowHTML(c) {
    return '<div class="wordrow" style="align-items:center;gap:10px;">' +
      '<input type="checkbox" class="neo-chk rowchk" data-code="' + esc(c.code) + '">' +
      '<div class="copycode" data-code="' + esc(c.code) + '" style="flex:1;min-width:0;cursor:pointer;" title="클릭하면 코드 복사">' +
        '<div style="font-weight:800;">' + esc(c.code) + '<span class="copyhint">⧉ 복사</span></div>' +
        '<div class="sc-l" style="opacity:.7;">' + (c.label ? esc(c.label) + " · " : "") + esc(c.createdAt || "") + '</div>' +
      '</div>' +
      '<button class="btn btn-sm btn-hard del" data-code="' + esc(c.code) + '">삭제</button>' +
    '</div>';
  }
  function render() {
    if (!allCodes.length) { $("list").innerHTML = '<p class="lead">아직 발급된 코드가 없어요.</p>'; $("bulkbar").style.display = "none"; return; }
    $("bulkbar").style.display = "";
    const list = filtered();
    if (!list.length) { $("list").innerHTML = '<p class="lead">검색 결과가 없어요.</p>'; }
    else {
      $("list").innerHTML = list.map(rowHTML).join("");
      Array.from(document.querySelectorAll(".del")).forEach(b => b.addEventListener("click", e => { e.stopPropagation(); del(b.getAttribute("data-code")); }));
      Array.from(document.querySelectorAll(".copycode")).forEach(el => el.addEventListener("click", () => copyCode(el)));
      Array.from(document.querySelectorAll(".rowchk")).forEach(ch => ch.addEventListener("change", updateSel));
    }
    $("selall").checked = false; $("selall").indeterminate = false;
    updateSel();
  }
  function updateSel() {
    const total = document.querySelectorAll(".rowchk").length;
    const sel = document.querySelectorAll(".rowchk:checked").length;
    $("selcount").textContent = sel ? "· " + sel + "개 선택" : "";
    $("bulkdel").disabled = !sel;
    $("bulkdel").textContent = sel ? "선택 " + sel + "개 삭제" : "선택 삭제";
    $("selall").checked = total > 0 && sel === total;
    $("selall").indeterminate = sel > 0 && sel < total;
  }
  function selectedCodes() {
    return Array.from(document.querySelectorAll(".rowchk:checked")).map(ch => ch.getAttribute("data-code"));
  }

  function fallbackCopy(text, done) {
    try { const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); done(); } catch (e) {}
  }
  function copyCode(el) {
    const code = el.getAttribute("data-code");
    const hint = el.querySelector(".copyhint");
    const done = () => { if (!hint) return; hint.textContent = "복사됨 ✓"; hint.style.color = "var(--neo-blaze)"; hint.style.opacity = "1";
      setTimeout(() => { hint.textContent = "⧉ 복사"; hint.style.color = ""; hint.style.opacity = ""; }, 1200); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(code).then(done).catch(() => fallbackCopy(code, done));
    else fallbackCopy(code, done);
  }

  function csvCell(v) { v = String(v == null ? "" : v); return /[",\r\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; }
  function exportCsv() {
    const list = filtered();
    if (!list.length) return;
    const rows = [["code", "label", "createdAt"]].concat(list.map(c => [c.code, c.label || "", c.createdAt || ""]));
    const csv = rows.map(r => r.map(csvCell).join(",")).join("\r\n");
    const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });   // BOM → 엑셀 한글 깨짐 방지
    const d = new Date();
    const stamp = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "neo-codes-" + stamp + ".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  async function bulkDelete() {
    const codes = selectedCodes();
    if (!codes.length) return;
    if (!(await neoConfirm(codes.length + "개 코드를 삭제할까요?\n이 코드를 쓰던 학생들은 더이상 앱을 못 써요.\n(되돌릴 수 없어요)", { danger: true }))) return;
    $("bulkdel").disabled = true; $("bmsg").className = "verdict";
    let ok = 0, fail = 0;
    for (let i = 0; i < codes.length; i++) {
      $("bmsg").textContent = "삭제 중… (" + (i + 1) + "/" + codes.length + ")";
      try { const d = await api("action=del&admin=" + encodeURIComponent(admin) + "&code=" + encodeURIComponent(codes[i])); if (d && d.ok) ok++; else fail++; }
      catch (e) { fail++; }
    }
    await load();
    $("bmsg").textContent = "삭제 완료: " + ok + "개" + (fail ? ", 실패 " + fail + "개" : "");
    $("bmsg").className = fail ? "verdict no" : "verdict ok";
    setTimeout(() => { if ($("bmsg")) { $("bmsg").textContent = ""; } }, 4000);
  }

  function add() {
    const code = $("newcode").value.trim();
    if (!code) { $("amsg").textContent = "코드를 입력해봐요."; $("amsg").className = "verdict no"; return; }
    $("amsg").textContent = "추가 중…"; $("amsg").className = "verdict";
    api("action=add&admin=" + encodeURIComponent(admin) + "&code=" + encodeURIComponent(code) + "&label=" + encodeURIComponent($("newlabel").value.trim())).then(d => {
      if (d && d.ok) { $("amsg").textContent = "추가됐어요 ✓"; $("amsg").className = "verdict ok"; $("newcode").value=""; $("newlabel").value=""; load(); }
      else if (d && d.error === "exists") { $("amsg").textContent = "이미 있는 코드예요."; $("amsg").className = "verdict no"; }
      else { $("amsg").textContent = "추가 실패."; $("amsg").className = "verdict no"; }
    }).catch(() => { $("amsg").textContent = "인터넷 연결이 필요해요."; $("amsg").className = "verdict no"; });
  }

  function del(code) {
    neoConfirm("코드 '" + code + "'를 삭제할까요?\n이 코드를 쓰던 학생은 더이상 앱을 못 써요.", { danger: true }).then(ok => {
      if (!ok) return;
      api("action=del&admin=" + encodeURIComponent(admin) + "&code=" + encodeURIComponent(code)).then(d => {
        if (d && d.ok) load();
      }).catch(() => {});
    });
  }

  // ===== 엑셀 명단 일괄 생성 =====
  // 한글 이니셜(영어식 k/p/t/j). 초성 인덱스 0~18, ㅇ초성은 모음으로.
  const CHO = ['k','kk','n','t','tt','r','m','p','pp','s','ss','','j','jj','ch','k','t','p','h'];
  const JUNG = ['a','a','y','y','e','e','y','y','o','w','w','o','y','u','w','w','w','y','e','u','i'];
  function syllableInitial(ch) {
    const code = ch.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const idx = code - 0xAC00;
      const cho = Math.floor(idx / 588);
      const jung = Math.floor((idx % 588) / 28);
      let r = CHO[cho];
      if (!r) r = JUNG[jung];      // ㅇ초성 → 모음 첫 글자
      return r ? r[0] : "";
    }
    if (/[A-Za-z]/.test(ch)) return ch.toLowerCase();
    return "";
  }
  function makeInitials(name) {
    const chars = Array.from((name || "").trim()).filter(c => /\S/.test(c));
    let out = "";
    for (const c of chars) { const i = syllableInitial(c); if (i) out += i; if (out.length >= 3) break; }
    return out.slice(0, 3);
  }
  function last4(phone) { return (phone || "").replace(/\D/g, "").slice(-4); }

  // 브라우저 내장 기능(DecompressionStream)으로 .xlsx(zip) 직접 읽기 — 외부 라이브러리 불필요
  async function readXlsx(file) {
    const buf = new Uint8Array(await file.arrayBuffer());
    const dv = new DataView(buf.buffer);
    let eocd = -1;
    for (let i = buf.length - 22; i >= 0; i--) { if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; } }
    if (eocd < 0) throw new Error("엑셀 형식이 아니에요");
    const cdCount = dv.getUint16(eocd + 10, true);
    let off = dv.getUint32(eocd + 16, true);
    const entries = {};
    for (let n = 0; n < cdCount; n++) {
      if (dv.getUint32(off, true) !== 0x02014b50) break;
      const method = dv.getUint16(off + 10, true);
      const compSize = dv.getUint32(off + 20, true);
      const nameLen = dv.getUint16(off + 28, true);
      const extraLen = dv.getUint16(off + 30, true);
      const commentLen = dv.getUint16(off + 32, true);
      const lho = dv.getUint32(off + 42, true);
      const name = new TextDecoder().decode(buf.subarray(off + 46, off + 46 + nameLen));
      entries[name] = { method, compSize, lho };
      off += 46 + nameLen + extraLen + commentLen;
    }
    async function extract(name) {
      const e = entries[name]; if (!e) return null;
      const lnameLen = dv.getUint16(e.lho + 26, true);
      const lextraLen = dv.getUint16(e.lho + 28, true);
      const dataStart = e.lho + 30 + lnameLen + lextraLen;
      const comp = buf.subarray(dataStart, dataStart + e.compSize);
      if (e.method === 0) return new TextDecoder().decode(comp);
      const stream = new Response(comp).body.pipeThrough(new DecompressionStream("deflate-raw"));
      const ab = await new Response(stream).arrayBuffer();
      return new TextDecoder().decode(new Uint8Array(ab));
    }
    const sheetKey = Object.keys(entries).find(k => /^xl\/worksheets\/sheet\d+\.xml$/.test(k)) || "xl/worksheets/sheet1.xml";
    return { sheet: await extract(sheetKey), shared: await extract("xl/sharedStrings.xml") };
  }
  function parseShared(xml) {
    if (!xml) return [];
    const doc = new DOMParser().parseFromString(xml, "application/xml");
    return Array.from(doc.getElementsByTagName("si")).map(si =>
      Array.from(si.getElementsByTagName("t")).map(t => t.textContent).join(""));
  }
  function parseSheet(xml, shared) {
    const doc = new DOMParser().parseFromString(xml, "application/xml");
    return Array.from(doc.getElementsByTagName("row")).map(row => {
      const obj = {};
      Array.from(row.getElementsByTagName("c")).forEach(c => {
        const ref = c.getAttribute("r") || ""; const t = c.getAttribute("t");
        const col = (ref.match(/[A-Z]+/) || [""])[0];
        const is = c.getElementsByTagName("is")[0];
        const v = c.getElementsByTagName("v")[0];
        let val = "";
        if (t === "inlineStr" && is) val = Array.from(is.getElementsByTagName("t")).map(x => x.textContent).join("");
        else if (t === "s" && v) val = shared[parseInt(v.textContent, 10)] || "";
        else if (v) val = v.textContent;
        obj[col] = val;
      });
      return obj;
    });
  }

  let bulkRows = [];
  function updateDupMarks() {
    const counts = {};
    bulkRows.forEach(r => { const c = (r.code || "").trim(); if (c) counts[c] = (counts[c] || 0) + 1; });
    Array.from(document.querySelectorAll(".bcode")).forEach(inp => {
      const c = (bulkRows[+inp.getAttribute("data-i")].code || "").trim();
      inp.style.borderColor = (c && counts[c] > 1) ? "var(--neo-hot)" : "";
    });
    const hasDup = Object.keys(counts).some(c => counts[c] > 1);
    $("dupwarn").textContent = hasDup ? "⚠ 코드가 겹치는 학생이 있어요(빨간 칸). 한 명은 코드를 바꿔야 둘 다 로그인돼요." : "";
  }
  function renderPreview() {
    $("preview").innerHTML = bulkRows.map((r, i) =>
      '<div class="wordrow" style="align-items:center;gap:8px;">' +
        '<span style="flex:0 0 64px;font-weight:800;">' + esc(r.name) + '</span>' +
        '<input class="quiz-input bcode" data-i="' + i + '" value="' + esc(r.code) + '" autocapitalize="off" autocorrect="off" spellcheck="false" style="flex:1;margin:0;padding:8px 10px;">' +
      '</div>'
    ).join("");
    Array.from(document.querySelectorAll(".bcode")).forEach(inp =>
      inp.addEventListener("input", () => { bulkRows[+inp.getAttribute("data-i")].code = inp.value.trim(); updateDupMarks(); }));
    $("bulkadd").style.display = bulkRows.length ? "" : "none";
    updateDupMarks();
  }

  $("xlsxfile").addEventListener("change", async ev => {
    const file = ev.target.files[0]; if (!file) return;
    $("xmsg").textContent = "명단 읽는 중…"; $("xmsg").className = "verdict";
    $("preview").innerHTML = ""; $("bulkadd").style.display = "none"; bulkRows = [];
    try {
      const { sheet, shared } = await readXlsx(file);
      if (!sheet) throw new Error("시트를 찾지 못했어요");
      const rows = parseSheet(sheet, parseShared(shared));
      let nameCol = null, phoneCol = null, headerIdx = -1;
      for (let i = 0; i < Math.min(rows.length, 6); i++) {
        for (const col in rows[i]) {
          const val = (rows[i][col] || "").trim();
          if (["이름", "성명", "학생명", "수강생"].includes(val)) nameCol = col;
          if (val === "연락처" || val.includes("전화") || val.includes("휴대") || val.includes("핸드폰")) phoneCol = col;
        }
        if (nameCol && phoneCol) { headerIdx = i; break; }
      }
      if (!nameCol || !phoneCol) throw new Error("'이름'과 '연락처' 열을 찾지 못했어요");
      const seen = new Set(); let dupPeople = 0;
      for (let i = headerIdx + 1; i < rows.length; i++) {
        const name = (rows[i][nameCol] || "").trim();
        if (!name) continue;
        const phoneDigits = (rows[i][phoneCol] || "").replace(/\D/g, "");
        const key = name + "|" + phoneDigits;       // 동일인 = 이름+전화 동일
        if (seen.has(key)) { dupPeople++; continue; }
        seen.add(key);
        bulkRows.push({ name, code: name.replace(/\s+/g, "") + phoneDigits.slice(-4) });   // 한글 풀네임 + 전화 뒤4
      }
      if (!bulkRows.length) throw new Error("학생 행을 찾지 못했어요");
      renderPreview();
      $("xmsg").textContent = bulkRows.length + "명 읽었어요" + (dupPeople ? " (동일인 " + dupPeople + "명 제외)" : "") + ". 코드 확인·수정 후 추가하세요.";
      $("xmsg").className = "verdict ok";
    } catch (e) { $("xmsg").textContent = "읽기 실패: " + e.message; $("xmsg").className = "verdict no"; }
  });

  $("bulkadd").addEventListener("click", async () => {
    const valid = bulkRows.filter(r => r.code);
    if (!valid.length) return;
    if (!(await neoConfirm(valid.length + "명의 코드를 추가할까요?"))) return;
    $("bulkadd").disabled = true;
    let ok = 0, dup = 0, fail = 0;
    for (let i = 0; i < valid.length; i++) {
      $("xmsg").textContent = "추가 중… (" + (i + 1) + "/" + valid.length + ")"; $("xmsg").className = "verdict";
      try {
        const d = await api("action=add&admin=" + encodeURIComponent(admin) + "&code=" + encodeURIComponent(valid[i].code) + "&label=" + encodeURIComponent(valid[i].name));
        if (d && d.ok) ok++; else if (d && d.error === "exists") dup++; else fail++;
      } catch (e) { fail++; }
    }
    $("bulkadd").disabled = false;
    $("xmsg").textContent = "완료: 추가 " + ok + "명" + (dup ? ", 이미있음 " + dup : "") + (fail ? ", 실패 " + fail : "");
    $("xmsg").className = fail ? "verdict no" : "verdict ok";
    $("preview").innerHTML = ""; $("bulkadd").style.display = "none"; bulkRows = []; $("xlsxfile").value = "";
    load();
  });

  // ===================== 학생 진도 =====================
  let students = [], TOT = null, psort = "rate";

  function ensureTot() {
    if (TOT || typeof NEO_DECK === "undefined") return;
    TOT = {
      practical: NEO_DECK.vocab(null, "practical").length,
      academic: NEO_DECK.vocab(null, "academic").length,
      ctest: NEO_DECK.blanks().flatMap(c => c.words).length,
    };
    TOT.all = TOT.practical + TOT.academic + TOT.ctest;
  }
  function statOf(dataStr) {
    let db = {}; try { db = JSON.parse(dataStr || "{}") || {}; } catch (e) {}
    let known = 0, learning = 0, viewed = 0, seen = 0, correct = 0;
    const st = { practical: 0, academic: 0, ctest: 0 };
    for (const k in db) {
      const v = db[k] || {}, deck = (k.split(":")[1] || "");
      if (v.status === "known") known++; else if (v.status === "learning") learning++; else if (v.viewed) viewed++;
      seen += v.seen || 0; correct += v.correct || 0;
      if ((v.box || 0) > 0 && st[deck] !== undefined) st[deck]++;
    }
    ensureTot();
    const studied = st.practical + st.academic + st.ctest;
    const rate = TOT && TOT.all ? Math.round(studied / TOT.all * 100) : 0;
    return { known, learning, viewed, seen, correct, st, studied, rate };
  }
  // ---------- Writing Task 1 진도 ----------
  // 분모는 writing/data/w1_meta.js(908B) 에서. 2.1MB 짜리 w1.js/w1_mock.js 는 로드하지 않는다.
  // 집계 기준은 writing/mypage.html 과 동일: 완료=푼 세트 수(점수 무관), 정답률=Σcorrect/Σtotal(마이크로 평균).
  // ※ writing 저장 정책이 "최고점만 남김"이라 여기 정답률은 상한선이고, 시도 횟수·향상 곡선은 산출 불가.
  const W1META = window.NEO_DATA_W1_META || { concepts: [], mocks: 0, conceptSets: 0, totalSets: 0 };
  function statOfW1(dataStr) {
    let db = {}; try { db = JSON.parse(dataStr || "{}") || {}; } catch (e) {}
    const byC = {};                       // concept_n → {correct,total,sets:Set}
    const mocks = new Set();
    let correct = 0, total = 0, done = 0;
    for (const k in db) {
      const v = db[k] || {}; done++;
      correct += v.correct || 0; total += v.total || 0;
      if (k.indexOf("mock") === 0) { mocks.add(v.exam_id != null ? v.exam_id : k); continue; }
      const cn = v.concept_n;
      if (cn == null) continue;
      if (!byC[cn]) byC[cn] = { correct: 0, total: 0, sets: new Set() };
      byC[cn].correct += v.correct || 0; byC[cn].total += v.total || 0;
      if (v.set_id != null) byC[cn].sets.add(v.set_id);
    }
    const rate = W1META.totalSets ? Math.round(done / W1META.totalSets * 100) : 0;   // 학습률 = 완료 세트 비율
    const acc = total ? Math.round(correct / total * 100) : 0;
    return { done, rate, acc, correct, total, byC, mocksDone: mocks.size };
  }
  function tsOf(at) { const t = Date.parse(at || ""); return isNaN(t) ? 0 : t; }
  function relTime(at) {
    const t = tsOf(at); if (!t) return "기록 없음";
    const diff = Date.now() - t, day = 86400000;
    if (diff < day) return "오늘";
    const d = Math.floor(diff / day);
    if (d === 1) return "어제";
    if (d < 7) return d + "일 전";
    if (d < 30) return Math.floor(d / 7) + "주 전";
    if (d < 365) return Math.floor(d / 30) + "개월 전";
    return Math.floor(d / 365) + "년 전";
  }

  function loadProg() {
    $("pmsg").textContent = "불러오는 중…"; $("pmsg").className = "verdict"; $("plist").innerHTML = "";
    api("action=getallprog&admin=" + encodeURIComponent(admin)).then(d => {
      if (!d || !d.ok) {
        if (d && d.error === "forbidden") { sessionStorage.removeItem("neo_admin"); $("panel").style.display = "none"; $("gate").style.display = "block"; return; }
        $("pmsg").textContent = "불러오지 못했어요. (서버에 최신 gs 배포가 필요할 수 있어요)"; $("pmsg").className = "verdict no"; return;
      }
      $("pmsg").textContent = "";
      // 한 학생 = 두 앱. getallprog 가 vocab(data/at)과 writing(data_w1/at_w1)을 함께 준다.
      students = (d.students || []).map(s => Object.assign({}, s, {
        stat: statOf(s.data),
        w1: statOfW1(s.data_w1),
      }));
      renderProg();
    }).catch(() => { $("pmsg").textContent = "인터넷 연결이 필요해요."; $("pmsg").className = "verdict no"; });
  }
  function renderProg() {
    ensureTot();
    const q = ($("psearch").value || "").trim().toLowerCase();
    let list = students.filter(s => !q || (s.label || "").toLowerCase().includes(q) || (s.code || "").toLowerCase().includes(q));
    // 마지막 접속 = 두 앱 중 더 최근 것
    const lastOf = s => Math.max(tsOf(s.at), tsOf(s.at_w1));
    const sortKey = s => psort === "w1" ? s.w1.rate
                       : psort === "both" ? Math.round((s.stat.rate + s.w1.rate) / 2)
                       : s.stat.rate;
    list.sort((a, z) => {
      if (psort === "name") return (a.label || a.code).localeCompare(z.label || z.code, "ko");
      if (psort === "recent") return lastOf(z) - lastOf(a);
      return (sortKey(z) - sortKey(a)) || (z.stat.known - a.stat.known);
    });
    $("pcount").textContent = students.length;
    if (!students.length) { $("plist").innerHTML = '<p class="lead">아직 학생(코드)이 없어요.</p>'; return; }
    if (!list.length) { $("plist").innerHTML = '<p class="lead">검색 결과가 없어요.</p>'; return; }
    $("plist").innerHTML = list.map(s => {
      const vStarted = s.stat.studied > 0 || s.stat.known || s.stat.viewed || tsOf(s.at);
      const wStarted = s.w1.done > 0 || tsOf(s.at_w1);
      const started = vStarted || wStarted;                 // 두 앱 다 미시작일 때만 dim
      const badge = psort === "w1" ? s.w1.rate : psort === "both" ? Math.round((s.stat.rate + s.w1.rate) / 2) : s.stat.rate;
      return '<div class="wordrow prow" data-code="' + esc(s.code) + '" style="align-items:center;cursor:pointer;' + (started ? '' : 'opacity:.55;') + '">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-weight:800;">' + esc(s.label || s.code) + (started ? '' : ' <span class="sc-l" style="color:var(--neo-mute);font-weight:700;">· 미시작</span>') + '</div>' +
          '<div class="sc-l" style="opacity:.7;">어휘 ' + s.stat.rate + '% · W1 ' + s.w1.rate + '% · ' + relTime(lastOf(s) ? new Date(lastOf(s)).toISOString() : "") + '</div>' +
        '</div>' +
        '<span class="sc-l" style="font-weight:900;font-size:15px;">' + badge + '%</span>' +
      '</div>';
    }).join("");
    Array.from(document.querySelectorAll(".prow")).forEach(r => r.addEventListener("click", () => showStudent(r.getAttribute("data-code"))));
  }
  // countLabel 을 주면 "N / M · P%" 대신 그 문자열을 쓴다(정답률 막대처럼 분모가 무의미할 때).
  function pbar(label, st, tot, countLabel) {
    const pct = tot ? Math.round(st / tot * 100) : 0;
    return '<div class="deck-card" style="margin-bottom:10px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;"><span class="dt" style="font-size:16px;">' + label + '</span>' +
      '<span class="dcount">' + (countLabel || (st + ' / ' + tot + ' · ' + pct + '%')) + '</span></div>' +
      '<div class="bar" style="margin-top:8px;"><div class="fill" style="width:' + pct + '%"></div></div></div>';
  }
  function showStudent(code) {
    const s = students.find(x => x.code === code); if (!s) return;
    ensureTot();
    const st = s.stat, acc = st.seen ? Math.round(st.correct / st.seen * 100) : 0;
    const tp = TOT || { practical: 0, academic: 0, ctest: 0 };
    const w = s.w1;
    const last = Math.max(tsOf(s.at), tsOf(s.at_w1));

    // --- Writing Task 1 섹션 ---
    let w1html;
    if (!w.done) {
      w1html = '<p class="lead">아직 푼 세트가 없어요.</p>';
    } else {
      const conceptRows = W1META.concepts.map(c => {
        const b = w.byC[c.n];
        if (!b) return "";
        const pct = b.total ? Math.round(b.correct / b.total * 100) : 0;
        return pbar(c.short + ' <span class="sc-l" style="opacity:.7;font-weight:700;">' + b.sets.size + '/' + c.sets + ' 세트</span>', pct, 100, pct + '%');
      }).filter(Boolean).join("");
      w1html =
        '<div class="prog-cards" style="margin-bottom:16px;">' +
          '<div class="stat-card"><div class="sc-v">' + w.done + '</div><div class="sc-l">완료 세트</div></div>' +
          '<div class="stat-card acid"><div class="sc-v">' + w.rate + '%</div><div class="sc-l">학습률</div></div>' +
          '<div class="stat-card grind"><div class="sc-v">' + w.acc + '%</div><div class="sc-l">정답률</div></div>' +
          '<div class="stat-card"><div class="sc-v">' + w.mocksDone + '</div><div class="sc-l">모의고사</div></div>' +
        '</div>' +
        pbar("전체 진도", w.done, W1META.totalSets) +
        pbar("모의고사", w.mocksDone, W1META.mocks) +
        (conceptRows ? '<div class="sc-l" style="margin:14px 0 8px;font-weight:800;">개념별 정답률</div>' + conceptRows : "");
    }

    $("pdetail").innerHTML =
      '<div style="font-weight:900;font-size:22px;">' + esc(s.label || s.code) + '</div>' +
      '<div class="sc-l" style="opacity:.7;margin:2px 0 14px;">코드 ' + esc(s.code) + ' · 마지막 접속 ' + relTime(last ? new Date(last).toISOString() : "") + '</div>' +
      '<div class="section-kr" style="margin-bottom:8px;">📚 어휘</div>' +
      '<div class="prog-cards" style="margin-bottom:16px;">' +
        '<div class="stat-card"><div class="sc-v">' + st.viewed + '</div><div class="sc-l">확인한 단어</div></div>' +
        '<div class="stat-card acid"><div class="sc-v">' + st.learning + '</div><div class="sc-l">헷갈리는 단어</div></div>' +
        '<div class="stat-card grind"><div class="sc-v">' + st.known + '</div><div class="sc-l">외운 단어</div></div>' +
        '<div class="stat-card"><div class="sc-v">' + acc + '%</div><div class="sc-l">퀴즈 정답률</div></div>' +
      '</div>' +
      pbar("실용어휘", st.st.practical, tp.practical) +
      pbar("학술어휘", st.st.academic, tp.academic) +
      pbar("Reading Task1 빈칸어휘", st.st.ctest, tp.ctest) +
      '<div class="section-kr" style="margin:22px 0 8px;">✏️ Writing Task 1</div>' +
      w1html;
    $("plist-view").style.display = "none"; $("pdetail-view").style.display = "block";
  }
  function switchTab(which) {
    const prog = which === "prog";
    $("code-panel").style.display = prog ? "none" : "block";
    $("prog-panel").style.display = prog ? "block" : "none";
    $("tab-code").className = "btn btn-sm " + (prog ? "btn-ghost" : "btn-grind");
    $("tab-prog").className = "btn btn-sm " + (prog ? "btn-grind" : "btn-ghost");
    $("akick").textContent = prog ? "ADMIN · STUDENT PROGRESS" : "ADMIN · CODE MANAGER";
    $("atitle").textContent = prog ? "학생 진도" : "코드 관리";
    if (prog) { $("plist-view").style.display = "block"; $("pdetail-view").style.display = "none"; if (!students.length) loadProg(); }
  }

  $("tab-code").addEventListener("click", () => switchTab("code"));
  $("tab-prog").addEventListener("click", () => switchTab("prog"));
  $("prefresh").addEventListener("click", loadProg);
  $("psearch").addEventListener("input", renderProg);
  $("pback").addEventListener("click", () => { $("pdetail-view").style.display = "none"; $("plist-view").style.display = "block"; });
  Array.from(document.querySelectorAll(".psort")).forEach(b => b.addEventListener("click", () => {
    psort = b.getAttribute("data-sort");
    Array.from(document.querySelectorAll(".psort")).forEach(x => { x.className = "btn btn-sm btn-ghost psort"; });
    b.className = "btn btn-sm btn-grind psort";
    renderProg();
  }));

  $("gin").addEventListener("click", gateIn);
  $("admincode").addEventListener("keydown", e => { if (e.key === "Enter") gateIn(); });
  $("addbtn").addEventListener("click", add);
  $("refresh").addEventListener("click", load);
  $("search").addEventListener("input", render);
  $("selall").addEventListener("change", () => {
    const on = $("selall").checked;
    Array.from(document.querySelectorAll(".rowchk")).forEach(ch => { ch.checked = on; });
    updateSel();
  });
  $("bulkdel").addEventListener("click", bulkDelete);
  $("csvexport").addEventListener("click", exportCsv);
  $("logout").addEventListener("click", () => { sessionStorage.removeItem("neo_admin"); location.href = "login.html"; });

  if (admin) showPanel(); else $("admincode").focus();
})();
</script>
