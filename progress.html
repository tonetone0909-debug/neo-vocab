<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>마이페이지 · NEO VOCAB</title>
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/icons/icon-32.png">
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="assets/app.css">
<script src="assets/config.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/ui.js"></script>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span>NEO VOCAB</a>
  <span class="crumb">MY PAGE</span>
</div>

<main class="app">
  <div class="kicker">MY PAGE · 마이페이지</div>
  <h1 class="title-kr" style="font-size:clamp(28px,7vw,40px);">마이페이지</h1>
  <p class="lead" id="hello" style="margin-top:8px;font-size:16px;font-weight:700;display:none;"></p>
  <div id="member-info" style="margin-top:8px;gap:8px;align-items:center;flex-wrap:wrap;display:none;"></div>
  <div id="reward-box" style="margin-top:14px;display:none;"></div>

  <div class="section-kr" style="margin-top:22px;">내 단어장</div>
  <div class="prog-cards">
    <a class="stat-card" id="c-total" href="mylist.html?list=all&view=list"><div class="sc-v" id="v-total">0</div><div class="sc-l">전체단어</div></a>
    <a class="stat-card" id="c-viewed" href="mylist.html?list=viewed"><div class="sc-v" id="v-viewed">0</div><div class="sc-l">확인한 단어</div></a>
    <a class="stat-card acid" id="c-learning" href="mylist.html?list=learning"><div class="sc-v" id="v-learning">0</div><div class="sc-l">헷갈리는 단어</div></a>
    <a class="stat-card grind" id="c-known" href="mylist.html?list=known"><div class="sc-v" id="v-known">0</div><div class="sc-l">외운 단어</div></a>
  </div>

  <div class="section-kr" style="margin-top:26px;">덱별 진도</div>
  <div id="deck-bars"></div>

  <div id="sync-box" class="card" style="margin-top:26px;display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <div style="min-width:0;flex:1;">
        <div class="sc-l">기기간 동기화</div>
        <div class="sc-l" id="sync-status" style="opacity:.7;font-weight:700;margin-top:4px;line-height:1.4;">준비 중…</div>
      </div>
      <button class="btn btn-sm btn-grind" id="sync-now" style="flex:0 0 auto;">지금 동기화 ↻</button>
    </div>
  </div>

  <div class="section-kr" style="margin-top:30px;">도움말</div>
  <a class="deck-card" href="guide.html" style="display:block;margin-bottom:10px;">
    <div class="dt" style="font-size:17px;">📖 사용법 가이드</div>
    <div class="dd">앱 쓰는 법을 화면과 함께 안내해요</div>
  </a>
  <a class="deck-card" href="install-guide.html" style="display:block;margin-bottom:10px;">
    <div class="dt" style="font-size:17px;">📲 설치 방법</div>
    <div class="dd">홈 화면에 앱처럼 추가하기 (안드로이드·아이폰)</div>
  </a>
  <a class="deck-card" href="voice-setup.html" style="display:block;">
    <div class="dt" style="font-size:17px;">🔊 발음 설정 (US·UK 같을 때)</div>
    <div class="dd">안드로이드 영국 발음 음성팩 설치</div>
  </a>

  <button class="btn btn-sm btn-ghost btn-block" id="logout" style="margin-top:22px;display:none;">로그아웃 ⏏</button>
</main>

<nav class="tabbar">
  <a href="index.html"><span class="ic">🏠</span>홈</a>
  <a href="study.html?deck=practical"><span class="ic">📝</span>어휘</a>
  <a href="quiz.html"><span class="ic">✅</span>퀴즈</a>
  <a href="progress.html" class="on"><span class="ic">📊</span>마이페이지</a>
</nav>

<script src="data/meta.js"></script>
<script src="data/vocab.js"></script>
<script src="data/blanks.js"></script>
<script src="assets/store.js"></script>
<script src="assets/deck.js"></script>
<script>
(function () {
  const $ = id => document.getElementById(id);
  const practical = NEO_DECK.vocab(null, "practical");
  const academic = NEO_DECK.vocab(null, "academic");
  const ctestItems = NEO_DECK.blanks().flatMap(c => c.words).map(w => ({ skill: "reading", deck: "ctest", lemma: w.lemma }));
  const allItems = [...practical, ...academic, ...ctestItems];

  function bar(label, items, href) {
    const s = NEO_STORE.deckStats(items);
    const pct = s.total ? Math.round(s.studied / s.total * 100) : 0;
    return `<a class="deck-card" href="${href}" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span class="dt" style="font-size:18px;">${label}</span>
        <span class="dcount">${s.studied} / ${s.total} · ${pct}%</span>
      </div>
      <div class="bar" style="margin-top:8px;"><div class="fill" style="width:${pct}%"></div></div>
    </a>`;
  }
  function render() {
    const sc = NEO_STORE.statusCounts();
    $("v-total").textContent = allItems.length;
    $("v-viewed").textContent = sc.viewed;
    $("v-learning").textContent = sc.learning;
    $("v-known").textContent = sc.known;
    $("deck-bars").innerHTML =
      bar("실용어휘", practical, "study.html?deck=practical") +
      bar("학술어휘", academic, "study.html?deck=academic") +
      bar("Reading Task1 빈칸어휘", ctestItems, "blanks.html");
  }
  render();

  // 코드 인증이 켜져 있을 때만 로그아웃 + 동기화 카드 노출
  if (((window.NEO_AUTH || {}).url || "").trim()) {
    $("logout").style.display = "";
    $("logout").addEventListener("click", () => {
      neoConfirm("로그아웃할까요? 다시 코드를 입력해야 사용할 수 있어요.").then(ok => {
        if (!ok) return;
        localStorage.removeItem("neo_code");
        localStorage.removeItem("neo_keep");
        sessionStorage.removeItem("neo_code");
        sessionStorage.removeItem("neo_auth_ok");
        sessionStorage.removeItem("neo_role");
        location.href = "login.html";
      });
    });

    // ===== 기기간 동기화 카드 (수동 동기화 + 상태 표시) =====
    $("sync-box").style.display = "";
    const code = sessionStorage.getItem("neo_code") || localStorage.getItem("neo_code") || "-";
    // 코드에서 이름 추출(박태환4355 → 박태환) — 인사말
    if (sessionStorage.getItem("neo_role") !== "admin") {
      const nm = (code || "").replace(/\s*\d{4}$/, "").trim() || code;
      if (nm && nm !== "-") { $("hello").textContent = nm + " 님, 반가워요 👋"; $("hello").style.display = ""; }

      // 멤버십 배지 + 누적 점수 + 다음 상품까지 남은 점수 (성적표에 이름이 있는 학생만 표시)
      const escHtml = s => String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

      // VOCA CARE 리워드 사다리 (누적 점수 → 상품)
      const REWARDS = [
        { pt: 200, name: "커피 쿠폰", icon: "☕" },
        { pt: 300, name: "커피 쿠폰", icon: "☕" },
        { pt: 400, name: "스타벅스 기프티콘", icon: "🎁", val: "1만원" },
        { pt: 500, name: "커피 쿠폰", icon: "☕" },
        { pt: 600, name: "커피 쿠폰", icon: "☕" },
        { pt: 700, name: "치킨 기프티콘", icon: "🍗", val: "3만원" },
        { pt: 800, name: "커피 쿠폰", icon: "☕" },
        { pt: 900, name: "커피 쿠폰", icon: "☕" },
        { pt: 1000, name: "배달의민족 기프티콘", icon: "🎉", val: "5만원" },
        { pt: 1200, name: "TOEFL 응시료 지원", icon: "🎫", val: "5만원" },
        { pt: 1400, name: "TOEFL 응시료 지원", icon: "🎫", val: "10만원" },
        { pt: 1550, name: "TOEFL 응시료 지원", icon: "🏆", val: "20만원" }
      ];
      function ensureRewardAnim() {
        if (document.getElementById("reward-anim-style")) return;
        const st = document.createElement("style"); st.id = "reward-anim-style";
        st.textContent =
          "@keyframes rwpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}"
          + "#reward-box .rw-fill{transition:width 1.1s cubic-bezier(.22,1,.36,1)}"
          + "#reward-box .rw-icon{display:inline-block;animation:rwpulse 2.4s ease-in-out infinite}"
          + "#reward-box .rw-card{animation:rwfade .5s ease both}"
          + "@keyframes rwfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}";
        document.head.appendChild(st);
      }
      function renderReward(score) {
        const box = $("reward-box"); if (!box) return;
        ensureRewardAnim();
        let prev = 0, next = null;
        for (const r of REWARDS) { if (r.pt > score) { next = r; break; } prev = r.pt; }
        if (!next) {
          box.innerHTML = '<div class="rw-card" style="background:#0B2E1C;color:#fff;border-radius:14px;padding:18px 20px;text-align:center;">'
            + '<div class="rw-icon" style="font-size:30px;">🏆</div>'
            + '<div style="font-weight:800;font-size:16px;margin-top:6px;">모든 리워드 달성!</div>'
            + '<div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;">누적 ' + score + '점 · 최고 등급이에요</div></div>';
          box.style.display = ""; return;
        }
        const remaining = next.pt - score, span = next.pt - prev;
        const pct = Math.max(3, Math.min(100, Math.round((score - prev) / span * 100)));
        const valTxt = next.val ? ' <span style="color:#5A7A68;font-weight:600;">(' + escHtml(next.val) + ')</span>' : '';
        box.innerHTML =
          '<div class="rw-card" style="background:linear-gradient(170deg,#E8FFF3,#FAFFFE);border:1.5px solid #D4EDDE;border-radius:14px;padding:16px 18px;">'
          + '<div style="display:flex;align-items:center;gap:12px;">'
          +   '<div class="rw-icon" style="font-size:30px;flex-shrink:0;">' + next.icon + '</div>'
          +   '<div style="flex:1;min-width:0;">'
          +     '<div style="font-size:12px;font-weight:700;letter-spacing:.02em;color:#5A7A68;">다음 상품까지</div>'
          +     '<div style="font-size:15px;font-weight:800;color:#0B2E1C;line-height:1.3;">' + escHtml(next.name) + valTxt + '</div>'
          +   '</div>'
          +   '<div style="text-align:right;flex-shrink:0;">'
          +     '<div style="font-size:26px;font-weight:800;color:#2ECC71;line-height:1;"><span id="rw-num">0</span></div>'
          +     '<div style="font-size:11px;color:#5A7A68;font-weight:600;margin-top:2px;">점 남았어요</div>'
          +   '</div>'
          + '</div>'
          + '<div style="margin-top:12px;height:9px;background:#D4EDDE;border-radius:99px;overflow:hidden;">'
          +   '<div class="rw-fill" style="width:3%;height:100%;background:linear-gradient(90deg,#2ECC71,#0B6E3A);border-radius:99px;"></div>'
          + '</div>'
          + '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#8A9F92;font-weight:600;">'
          +   '<span>누적 ' + score + '점</span><span>목표 ' + next.pt + '점</span>'
          + '</div></div>';
        box.style.display = "";
        const fill = box.querySelector(".rw-fill");
        requestAnimationFrame(() => requestAnimationFrame(() => { fill.style.width = pct + "%"; }));
        const numEl = $("rw-num"), dur = 900, t0 = performance.now();
        (function tick(t) {
          const k = Math.min(1, (t - t0) / dur), eased = 1 - Math.pow(1 - k, 3);
          numEl.textContent = Math.round(remaining * eased);
          if (k < 1) requestAnimationFrame(tick); else numEl.textContent = remaining;
        })(t0);
      }

      const authUrl = ((window.NEO_AUTH || {}).url || "").trim();
      if (authUrl) {
        fetch(authUrl + "?action=profile&code=" + encodeURIComponent(code))
          .then(r => r.json())
          .then(p => {
            if (!p || !p.ok || !p.membership) return;   // 리스트에 없으면 표기 X
            const prem = /PREMIUM/i.test(p.membership);
            const badge = '<span style="display:inline-block;border:2px solid #0A0A0A;border-radius:999px;'
              + 'padding:3px 11px;font-weight:800;font-size:12px;letter-spacing:.02em;'
              + (prem ? 'background:#E8FF3A;color:#0A0A0A;' : 'background:#0A0A0A;color:#fff;') + '">'
              + (prem ? '★ ' : '') + escHtml(p.membership) + '</span>';
            let chip = '';
            const hasScore = p.score !== null && p.score !== undefined && p.score !== '';
            if (hasScore)
              chip = '<span style="display:inline-block;border:2px solid #0A0A0A;border-radius:999px;'
                + 'padding:3px 11px;font-weight:800;font-size:12px;background:#FBFBF7;color:#0A0A0A;">'
                + '누적 ' + escHtml(String(p.score)) + '점</span>';
            const box = $("member-info");
            box.innerHTML = badge + chip;
            box.style.display = "flex";
            if (hasScore) renderReward(Number(p.score));   // 다음 상품까지 남은 점수
          })
          .catch(() => {});
      }
    }
    const pad = n => (n < 10 ? "0" : "") + n;
    const nowHM = () => { const d = new Date(); return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds()); };
    const setStatus = m => { $("sync-status").textContent = m; };
    setStatus("코드: " + code);

    function doSync() {
      if (!NEO_STORE.forceSync) { setStatus("이 버전은 동기화 미지원(앱 새로고침 필요)"); return; }
      $("sync-now").disabled = true;
      setStatus("동기화 중…");
      NEO_STORE.forceSync().then(r => {
        $("sync-now").disabled = false;
        if (r && r.ok) {
          render();   // 받아온 진도 즉시 반영(새로고침 없이)
          setStatus("✓ " + nowHM() + " 동기화됨 · 서버에 " + r.serverItems + "개 · 코드 " + r.code);
        } else {
          const e = r ? r.error : "?";
          const msg = e === "no_code" ? "로그인 코드가 없어요" : e === "network" ? "인터넷/서버 연결 실패" : e === "server" ? "서버 응답 오류" : e;
          setStatus("✗ 동기화 실패: " + msg + " · 코드 " + code);
        }
      });
    }
    $("sync-now").addEventListener("click", doSync);
    doSync();   // 진도 화면 들어올 때 자동 1회
  }
})();
</script>
</body>
</html>
